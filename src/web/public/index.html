<!DOCTYPE html>
<html lang="es" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentAssist - Configuración</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root[data-theme="dark"] {
            --bg: #0f172a;
            --fg: #f8fafc;
            --sidebar-bg: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --card: #1e293b;
            --card-hover: #334155;
            --border: #334155;
            --input-bg: #0f172a;
            --success: #10b981;
            --danger: #ef4444;
            --text-muted: #94a3b8;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.4);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.5), 0 2px 4px -2px rgb(0 0 0 / 0.5);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.5), 0 4px 6px -4px rgb(0 0 0 / 0.5);
            --shadow-inner: inset 0 2px 4px 0 rgb(0 0 0 / 0.3);
            --card-glow: inset 0 1px 0 0 rgba(255, 255, 255, 0.05);
            --bg-rgb: 15, 23, 42;
        }

        :root[data-theme="light"] {
            --bg: #f8fafc;
            --fg: #0f172a;
            --sidebar-bg: #ffffff;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --card: #ffffff;
            --card-hover: #f1f5f9;
            --border: #e2e8f0;
            --input-bg: #ffffff;
            --success: #10b981;
            --danger: #ef4444;
            --text-muted: #64748b;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --shadow-inner: inset 0 2px 4px 0 rgb(0 0 0 / 0.06);
            --card-glow: none;
            --bg-rgb: 248, 250, 252;
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--fg);
            margin: 0;
            padding: 0;
            line-height: 1.6;
            transition: background-color 0.3s ease, color 0.3s ease;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 280px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 50;
            position: relative;
            box-shadow: var(--shadow-md);
        }

        .sidebar.collapsed {
            transform: translateX(-100%);
            position: absolute;
            height: 100%;
        }

        .sidebar-header {
            height: 72px;
            padding: 0 24px;
            box-sizing: border-box;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            color: transparent;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            padding: 20px 12px;
            gap: 8px;
            flex: 1;
        }

        .nav-item {
            background: transparent;
            color: var(--text-muted);
            border: none;
            padding: 14px 16px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            border-radius: 8px;
            text-align: left;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-item:hover {
            color: var(--fg);
            background-color: var(--card-hover);
        }

        .nav-item.active {
            color: var(--primary);
            background-color: rgba(59, 130, 246, 0.1);
            font-weight: 600;
        }

        .nav-item svg {
            width: 20px;
            height: 20px;
        }

        .sidebar-footer {
            padding: 24px;
            border-top: 1px solid var(--border);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            position: relative;
            background-color: var(--bg);
        }

        .top-bar {
            height: 72px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            background-color: rgba(var(--bg-rgb, 15, 23, 42), 0.7);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .hamburger-btn {
            background: transparent;
            border: none;
            color: var(--fg);
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            display: flex;
        }

        .page-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 40px 24px;
            width: 100%;
            box-sizing: border-box;
        }

        .page-content {
            display: none;
        }

        .page-content.active {
            display: block;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card {
            background-color: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
            margin-bottom: 24px;
            box-shadow: var(--shadow-lg);
        }

        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: var(--fg);
        }

        input[type="text"],
        input[type="password"],
        select {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background-color: var(--input-bg);
            color: var(--fg);
            font-size: 14px;
        }

        button.primary-btn {
            background: linear-gradient(135deg, var(--primary), #6366f1);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        button.secondary-btn {
            background-color: var(--card);
            color: var(--fg);
            border: 1px solid var(--border);
            padding: 12px 18px;
            border-radius: 8px;
            cursor: pointer;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 54px;
            height: 28px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--text-muted);
            transition: .3s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: var(--primary);
        }

        input:checked+.slider:before {
            transform: translateX(26px);
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            align-items: center;
        }

        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            overflow: hidden;
        }

        .chat-history {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
            width: 100%;
            box-sizing: border-box;
        }

        .chat-message-wrapper {
            display: flex;
            gap: 16px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .chat-message-wrapper.user {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            flex-shrink: 0;
        }

        .avatar.assistant {
            background: var(--primary);
            color: white;
        }

        .avatar.user {
            background: var(--card-hover);
            border: 1px solid var(--border);
        }

        .chat-bubble {
            padding: 12px 20px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.6;
        }

        .chat-bubble.user {
            background: var(--card-hover);
            border: 1px solid var(--border);
            border-top-right-radius: 4px;
        }

        .chat-bubble.assistant {
            background: transparent;
            border-top-left-radius: 4px;
        }

        .chat-input-area {
            padding: 24px 0;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .chat-input-container {
            width: 100%;
            max-width: 800px;
            padding: 0 24px;
            position: relative;
            display: flex;
            align-items: center;
            box-sizing: border-box;
        }

        .chat-input-container input {
            flex: 1;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 16px 20px;
            background: var(--card);
            color: var(--fg);
            font-size: 15px;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }

        .badge.connected {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .badge.disconnected {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        #debug_box {
            margin-top: 10px;
            padding: 8px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            font-family: monospace;
            font-size: 10px;
            color: #fbbf24;
        }
    </style>
</head>

<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <h1>AgentAssist</h1>
        </div>
        <div class="nav-menu">
            <button class="nav-item active" onclick="navigate('chat')">Chat</button>
            <button class="nav-item" onclick="navigate('llm')">Cerebro</button>
            <button class="nav-item" onclick="navigate('channels')">Canales</button>
            <button class="nav-item" onclick="navigate('skills')">Skills</button>
        </div>
        <div class="sidebar-footer">
            <div id="update_notification"
                style="display:none; padding:10px; background:rgba(59,130,246,0.1); border-radius:8px; margin-bottom:10px;">
                <div id="update_version_text" style="font-size:11px;">v2.0 disponible</div>
                <button onclick="location.reload()" class="primary-btn"
                    style="padding:4px 8px; font-size:10px;">Actualizar</button>
            </div>
            <button class="theme-toggle" onclick="toggleTheme()" style="width:100%"><span id="theme-icon">🌗
                    Auto</span></button>
            <div id="debug_box" style="display:none">
                <div id="debug_content"></div>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <div style="display:flex; align-items:center; gap:12px;">
                <select id="sessions_select" onchange="switchSession(this.value)"
                    style="padding:6px; border-radius:8px; background:var(--card); color:var(--fg); border:1px solid var(--border)"></select>
                <button onclick="createNewChatSession()" class="secondary-btn"
                    style="padding:6px 12px; font-size:12px;">+ Nuevo</button>
            </div>
            <div id="wa_status_badge" class="badge disconnected">WhatsApp: Off</div>
        </header>

        <div id="chat" class="page-content active" style="height:calc(100vh - 72px)">
            <div class="chat-container">
                <div class="chat-main">
                    <div id="chat_history" class="chat-history"></div>
                    <div class="chat-input-area">
                        <div class="chat-input-container">
                            <input type="text" id="chat_input" placeholder="Escribe un mensaje..."
                                onkeypress="if(event.key==='Enter')sendChatMessage()" />
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="settings_container" class="page-container" style="display:none">
            <div id="llm" class="page-content">
                <h3>Configuración de Cerebro</h3>
                <div class="form-group">
                    <label>Proveedor</label>
                    <select id="model_provider" onchange="saveSettings()">
                        <option value="openai">OpenAI</option>
                        <option value="google">Gemini</option>
                        <option value="groq">Groq</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>API Key</label>
                    <input type="password" id="llm_api_key" onchange="saveSettings()" />
                </div>
                <div class="form-group">
                    <label>Modelo</label>
                    <input type="text" id="model_name" onchange="saveSettings()" />
                </div>
            </div>

            <div id="channels" class="page-content">
                <h3>Canales</h3>
                <div class="card">
                    <label class="toggle-switch"><input type="checkbox" id="bot_whatsapp_enabled"
                            onchange="saveSettings()" /><span class="slider"></span></label>
                    <span>WhatsApp Bot</span>
                </div>
            </div>

            <div id="skills" class="page-content">
                <h3>Habilidades (MCP)</h3>
                <div id="mcp_skills_container"></div>
            </div>
        </div>
    </main>

    <script>
        // --- NAVEGACIÓN & UI ---
        function navigate(id) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            const target = document.getElementById(id);
            if (target) target.classList.add('active');

            const settings = document.getElementById('settings_container');
            const chat = document.getElementById('chat');
            if (id === 'chat') {
                settings.style.display = 'none';
                chat.style.display = 'flex';
            } else {
                settings.style.display = 'block';
                chat.style.display = 'none';
                // Activar la subsección dentro de settings
                document.querySelectorAll('#settings_container .page-content').forEach(p => {
                    p.style.display = p.id === id ? 'block' : 'none';
                });
            }

            // Highlight nav
            document.querySelectorAll('.nav-item').forEach(btn => {
                if (btn.getAttribute('onclick').includes(`'${id}'`)) btn.classList.add('active');
            });
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            document.getElementById('theme-icon').textContent = next === 'dark' ? '🌙 Oscuro' : '☀️ Claro';
        }

        // --- CORE LOGIC ---
        window.currentSessionId = 'default';
        window.agentNameCache = 'IA';
        window.userNameCache = 'TU';
        let chatBusySending = false;

        async function loadSettings() {
            try {
                const r = await fetch('/api/settings');
                const d = await r.json();
                if (document.getElementById('llm_api_key')) document.getElementById('llm_api_key').value = d.llm_api_key || '';
                if (document.getElementById('model_name')) document.getElementById('model_name').value = d.model_name || 'gpt-4o';
                if (document.getElementById('model_provider')) document.getElementById('model_provider').value = d.model_provider || 'openai';
                if (document.getElementById('bot_whatsapp_enabled')) document.getElementById('bot_whatsapp_enabled').checked = d.bot_whatsapp_enabled;

                if (d.agent_name) window.agentNameCache = d.agent_name.substring(0, 2).toUpperCase();
                if (d.user_name) window.userNameCache = d.user_name.substring(0, 2).toUpperCase();
                window.settingsLoaded = true;
            } catch (e) { window.settingsLoaded = true; }
        }

        async function saveSettings() {
            if (!window.settingsLoaded) return;
            const payload = {
                model_provider: document.getElementById('model_provider')?.value,
                model_name: document.getElementById('model_name')?.value,
                llm_api_key: document.getElementById('llm_api_key')?.value,
                bot_whatsapp_enabled: document.getElementById('bot_whatsapp_enabled')?.checked
            };
            await fetch('/api/settings', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
        }

        async function loadSessions() {
            const r = await fetch('/api/sessions');
            const d = await r.json();
            const s = document.getElementById('sessions_select');
            s.innerHTML = '';
            d.sessions.forEach(sess => {
                const o = document.createElement('option');
                o.value = sess.id;
                o.textContent = sess.name;
                if (sess.id === window.currentSessionId) o.selected = true;
                s.appendChild(o);
            });
        }

        async function switchSession(id) {
            window.currentSessionId = id;
            loadChatHistory();
        }

        async function loadChatHistory() {
            if (chatBusySending) return;
            const r = await fetch(`/api/chat/history?sessionId=${window.currentSessionId}`);
            const d = await r.json();
            const h = document.getElementById('chat_history');
            h.innerHTML = '';
            d.messages.forEach(m => {
                const isBot = m.role === 'assistant';
                const html = `<div class="chat-message-wrapper ${isBot ? 'assistant' : 'user'}">
                    <div class="avatar ${isBot ? 'assistant' : 'user'}">${isBot ? window.agentNameCache : window.userNameCache}</div>
                    <div class="message-content">
                        <div class="chat-bubble ${isBot ? 'assistant' : 'user'}">${formatChatText(m.content)}</div>
                    </div>
                </div>`;
                h.insertAdjacentHTML('beforeend', html);
            });
            h.scrollTop = h.scrollHeight;
        }

        function formatChatText(t) {
            if (!t) return '';
            return t.replace(/\n/g, '<br>');
        }

        async function sendChatMessage() {
            const i = document.getElementById('chat_input');
            const t = i.value.trim();
            if (!t) return;
            chatBusySending = true;
            i.value = '';
            document.getElementById('chat_history').insertAdjacentHTML('beforeend', `<div class="chat-message-wrapper user"><div class="avatar user">${window.userNameCache}</div><div class="message-content"><div class="chat-bubble user">${t}</div></div></div>`);
            try {
                await fetch('/api/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: t, sessionId: window.currentSessionId }) });
                loadChatHistory();
            } finally { chatBusySending = false; }
        }

        async function checkStatus() {
            try {
                const r = await fetch('/api/whatsapp/status');
                const d = await r.json();
                const b = document.getElementById('wa_status_badge');
                b.textContent = d.status === 'connected' ? 'WhatsApp: ON' : 'WhatsApp: OFF';
                b.className = 'badge ' + (d.status === 'connected' ? 'connected' : 'disconnected');
            } catch (e) { }
        }

        // Init
        loadSettings();
        loadSessions();
        loadChatHistory();
        setInterval(loadChatHistory, 3000);
        setInterval(checkStatus, 5000);
    </script>
</body>

</html>
